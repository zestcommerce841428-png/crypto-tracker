<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CryptoTracker logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7bff"/>
      <stop offset="100%" stop-color="#3861fb"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbe6ff"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- candlestick bars forming an uptrend -->
  <g stroke="url(#bar)" stroke-linecap="round">
    <line x1="17" y1="38" x2="17" y2="46" stroke-width="3"/>
    <rect x="14" y="34" width="6" height="8" rx="1.5" fill="url(#bar)" stroke="none"/>

    <line x1="27" y1="28" x2="27" y2="48" stroke-width="3"/>
    <rect x="24" y="30" width="6" height="12" rx="1.5" fill="url(#bar)" stroke="none"/>

    <line x1="37" y1="20" x2="37" y2="40" stroke-width="3"/>
    <rect x="34" y="23" width="6" height="11" rx="1.5" fill="url(#bar)" stroke="none"/>

    <line x1="47" y1="12" x2="47" y2="32" stroke-width="3"/>
    <rect x="44" y="15" width="6" height="10" rx="1.5" fill="url(#bar)" stroke="none"/>
  </g>

  <!-- uptrend arrow accent -->
  <path d="M14 40 L26 27 L36 32 L48 14" fill="none" stroke="#16c784" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 14 L48 14 L48 20" fill="none" stroke="#16c784" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
